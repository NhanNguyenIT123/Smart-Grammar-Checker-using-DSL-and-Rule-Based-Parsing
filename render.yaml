services:
  # Backend Service
  - type: web
    name: grammar-dsl-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python run.py serve --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend Service
  - type: static
    name: grammar-dsl-frontend
    env: static
    buildCommand: "npm install && npm run build"
    publishPath: "./dist"
    headers:
      - path: "/*"
        headers:
          - key: Cache-Control
            value: no-cache
